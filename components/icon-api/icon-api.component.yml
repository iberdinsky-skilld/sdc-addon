$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

name: Icon API
description: >
  Demonstrates Drupal Icon API support. The icon() Twig function is available
  automatically when *.icons.yml files are present in any registered namespace —
  no configuration required.
group: Addon
status: experimental

props:
  type: object
  properties:
    icons:
      type: array
      title: Icons
      description: List of icon() calls to render.
      items:
        type: object
        properties:
          pack:
            type: string
          id:
            type: string
          settings:
            type: object

thirdPartySettings:
  sdcStorybook:
    disabledStories:
      - basic
    parameters:
      layout: centered
    stories:
      sprite:
        name: SVG Sprite
        description: >
          extractor: svg_sprite — icons are referenced from a single sprite file
          via <use href="{{ source }}#{{ icon_id }}">. The source and icon_id
          variables point to the sprite and symbol; content is empty (the
          template constructs the <use> element itself).
        props:
          icons:
            - { pack: umami_sprite, id: home }
            - { pack: umami_sprite, id: star }
            - { pack: umami_sprite, id: search }
            - { pack: umami_sprite, id: close }
            - { pack: umami_sprite, id: menu }

      svg:
        name: Inline SVG
        description: >
          extractor: svg — each icon is an individual .svg file. The inner SVG
          markup (without the <svg> wrapper) is provided as content, and the
          original <svg> element attributes are available via attributes.
        props:
          icons:
            - { pack: umami_svg, id: home }
            - { pack: umami_svg, id: star }
            - { pack: umami_svg, id: search }
            - { pack: umami_svg, id: close }
            - { pack: umami_svg, id: menu }

      path:
        name: Path (URL reference)
        description: >
          extractor: path — icons are referenced by URL, not inlined. The source
          variable contains the file URL; use it in an <img> or as a CSS
          background-image. Useful when icons should be cached independently or
          served from a CDN.
        props:
          icons:
            - { pack: umami_path, id: home }
            - { pack: umami_path, id: star }
            - { pack: umami_path, id: search }
            - { pack: umami_path, id: close }
            - { pack: umami_path, id: menu }

      settings:
        name: Settings Override
        description: >
          The third argument to icon() overrides settings defined in *.icons.yml.
          Here size and color are overridden per call.
        props:
          icons:
            - { pack: umami_sprite, id: home, settings: { size: sm } }
            - { pack: umami_sprite, id: star, settings: { size: md } }
            - { pack: umami_sprite, id: search, settings: { size: lg } }
            - { pack: umami_svg, id: close, settings: { color: '#e53935' } }
            - {
                pack: umami_svg,
                id: menu,
                settings: { color: '#1e88e5', size: lg },
              }

      cdn:
        name: CDN (svg, fetched on build)
        description: >
          extractor: svg with a remote /libraries/... source remapped to a CDN
          via resolveIconSource. The addon fetches and inlines only the icons
          actually used in stories, at build time, so they render as inline SVG
          and stay recolorable (here via the color setting).
        props:
          icons:
            - { pack: heroicons_cdn, id: heart, settings: { color: '#e53935' } }
            - { pack: heroicons_cdn, id: bolt, settings: { color: '#fbc02d' } }
            - { pack: heroicons_cdn, id: star, settings: { color: '#1e88e5' } }
            - { pack: heroicons_cdn, id: bell }
            - {
                pack: heroicons_cdn,
                id: check-circle,
                settings: { color: '#43a047', size: lg },
              }

      cdn_path:
        name: CDN Path (img)
        description: >
          extractor: path with a remote /libraries/... source remapped to a CDN.
          Rendered as <img src="…/{icon_id}.svg"> — no build fetch, the browser
          loads each file; the addon substitutes {icon_id} in the remote URL.
          It's an image, so no recolor.
        props:
          icons:
            - { pack: heroicons_cdn_path, id: heart }
            - { pack: heroicons_cdn_path, id: bolt }
            - { pack: heroicons_cdn_path, id: star }
            - { pack: heroicons_cdn_path, id: bell, settings: { size: lg } }

      cdn_sprite:
        name: CDN Sprite (fetched + inlined)
        description: >
          extractor: svg_sprite with a remote sprite remapped to a CDN. Browsers
          block external <use href>, so the addon fetches the sprite once at
          build and inlines it into the page; <use href="#icon_id"> then resolves
          locally. Recolorable via currentColor.
        props:
          icons:
            - { pack: bootstrap_cdn_sprite, id: house }
            - { pack: bootstrap_cdn_sprite, id: star }
            - { pack: bootstrap_cdn_sprite, id: bell }
            - { pack: bootstrap_cdn_sprite, id: heart }
            - { pack: bootstrap_cdn_sprite, id: gear, settings: { size: lg } }
