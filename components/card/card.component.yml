# This is so your IDE knows about the syntax for fixes and autocomplete.
$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json

# The human readable name.
name: Card

# Status can be: "experimental", "stable", "deprecated", "obsolete".
status: experimental

# Schema for the props. We support www.json-schema.org. Learn more about the
# syntax there.
props:
  type: object
  properties:
    html_tag:
      type: string
      title: HTML tag for wrapper

      # Limit the available options by using enums.
      enum:
        - article
        - div
      # Provide a default value
      default: article

# Slots always hold arbitrary markup. We know that beforehand, so no need for
# a schema for slots.
slots:
  # The key is the name of the slot. In your template you will use
  # {% block content %}.
  content:
    title: Content
    required: true
    description: The card content.
    examples:
      - Hello! I'm card content

thirdPartySettings:
  sdcStorybook:
    disabledStories:
      - basic
    parameters:
      layout: 'centered'
    stories:
      preview:
        props:
          html_tag: 'div'
        slots:
          content:
            - '<img class="umami-card__image" src="https://placehold.co/800x400"/>'
            - type: component
              component: 'umami:title'
              props:
                extra_classes:
                  - umami-card__title
                label: Preview Story Title
                html_tag: h3
            - type: component
              component: 'umami:read-more'
              props:
                extra_classes:
                  - umami-card__read-more
              slots:
                text: Learn More
                icon:
                  type: icon
                  pack_id: heroicons_cdn
                  icon_id: arrow-long-right

      custom_node:
        name: Custom Node (YouTube)
        description: >
          A custom story node type. `type: youtube` is rendered by a
          storyNodesRenderer defined in .storybook/main.ts into an <iframe>
          embed — showing how to add your own node types.
        slots:
          content:
            - type: youtube
              id: aqz-KE-bpKQ

      custom_node_nested:
        name: Custom Node (nested value)
        description: >
          A custom `type: link` node whose `value` is rendered through the
          shared pipeline (the renderValue argument) — exactly like a slot, so
          it can hold a string plus a nested `type: icon` node.
        slots:
          content:
            - type: link
              url: 'https://example.com'
              value:
                - 'Read the docs '
                - type: icon
                  pack_id: heroicons_cdn
                  icon_id: arrow-long-right
